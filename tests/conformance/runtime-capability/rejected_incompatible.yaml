      runtime_id: "runtime-baremetal-peer"
      boot_id: "boot-baremetal-peer-001"
      domain: "line-02"
      profile: "baremetal-min"
      implementation_id: "grcl-runtime-mcu"
      implementation_version: "0.1.0"
    protocol:
      grcl_protocol_major: 0
      grcl_protocol_minor: 1
      capability_schema_version: "v1"
    transport:
      supported_transports:
        - "serial"
        - "can"
      max_mtu_bytes: 256
      fragmentation: false
      retransmission: false
      flow_control: false
    qos:
      best_effort: true
      reliable: false
      history_max_samples: 1
      deadline: false
      liveliness: false
      durability_subset:
        - "volatile"
    encoding:
      cdr_compatible: true
      static_type_support: true
      dynamic_type_support: false
      endian_support:
        - "little"
      compression: false
    memory:
      max_payload_bytes: 256
      max_entities: 12
      static_storage: true
      no_heap_after_init: true
      history_bytes: 256
    executor:
