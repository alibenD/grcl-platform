    static_storage: false
    no_heap_after_init: false
    history_bytes: 8388608
  executor:
    poll: true
    sequential: true
    trigger_any: true
    trigger_all: true
    let_like: true
    multithread_support: true
  graph:
    projection_modes:
      - "full"
      - "runtime-only"
      - "interest-scoped"
    dynamic_endpoint_delta: true
    static_manifest: false
    full_graph_cache: true
  diagnostics:
    basic_health: true
