      remote_log_sink: false
    security:
      authentication: false
      authorization: false
      enclave: false
      audit: false
      signed_manifest: false
  rejection_reasons:
    - code: "unsupported_required_graph_projection"
      summary: "Peer does not support the requested full or interest-scoped graph session semantics."
      capability_path: "graph.projection_modes"
    - code: "unsupported_required_reliable_qos"
      summary: "Peer cannot provide required reliable delivery for this session request."
      capability_path: "qos.reliable"
  suggested_downgrade: null
  diagnostic_code: "negotiation.rejected.incompatible_capability"
  scope: session
notes:
  - "The schema currently requires effective_capability even when negotiation is rejected; this fixture exposes the peer safe declared capability as the visible candidate."
  - "No session or channel is opened when status is rejected_incompatible."
  - "Availability and health are intentionally excluded so the rejection is explained only by capability mismatch."
