    endian_support:
      - "little"
      - "big"
    compression: true
  memory:
    max_payload_bytes: 524288
    max_entities: 2048
    static_storage: false
    no_heap_after_init: false
    history_bytes: 4194304
  executor:
    poll: true
    sequential: true
    trigger_any: true
    trigger_all: true
    let_like: true
    multithread_support: true
  graph:
    projection_modes:
      - "full"
      - "interest-scoped"
      - "runtime-only"
    dynamic_endpoint_delta: true
    static_manifest: false
    full_graph_cache: true
  diagnostics:
    basic_health: true
    extended_metrics: true
    tracing: true
    remote_log_sink: true
  security:
    authentication: true
    authorization: true
    enclave: true
    audit: true
    signed_manifest: true
